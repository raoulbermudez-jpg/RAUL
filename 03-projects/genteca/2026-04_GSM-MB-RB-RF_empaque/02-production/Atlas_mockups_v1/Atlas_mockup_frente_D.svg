<?xml version="1.0" encoding="UTF-8"?>
<!--
  Atlas AT-2 — Static Key Visual / Mockup Frente
  Proyecto: 2026-04_GSM-MB-RB-RF_empaque
  Alternativa: D (Nueva — QR en zona de titulos + "Hasta 10 veces mas rapido" + flecha conectora)
  Modelo de referencia: GSM-RB (los otros 3 modelos siguen mismo layout con paleta correspondiente)
  Fecha: 2026-05-04
  Estado: Arte casi final — para presentacion a Junta Directiva (4 alternativas)
  Resolucion: 800 x 1200 px (proporcion blister frente) — RGB para presentacion digital
  Fuente copy: Solenne_SO-1_alternativas_v2 §Alternativa D
  Gate: Bruna_gate_empaque_v1 §7.2 (Hasta 10x) + §7.1 (NTC) + §2 Claim C (Inverter) + §2 Claim A
  NOTA: Oz toma el ganador y lo adapta a CMYK + sangrado 3mm para imprenta.
  DUDA ABIERTA: Lengüeta "AVERIGUALO" y "Sensor NTC: protege contra calentamiento*" pendientes
  gate explícito de Bruna antes de arte final.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200"
     font-family="Montserrat, 'Futura Bold', Arial, sans-serif">

  <!-- ===== DEFINICIONES / FILTROS ===== -->
  <defs>
    <!-- Gradiente de fondo principal: gris oscuro a negro -->
    <linearGradient id="fondoPrincipalD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>

    <!-- Gradiente para el bloque unitario de claims (fondo levemente naranja) -->
    <linearGradient id="bloqueGradienteD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8200" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF8200" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Gradiente para el dato protagonista "Hasta 10 veces mas rapido" -->
    <linearGradient id="gradienteDato" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8200"/>
      <stop offset="100%" stop-color="#FF9B33"/>
    </linearGradient>

    <!-- Glow naranja para el dato protagonista -->
    <filter id="glowNaranja" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Sombra suave para QR -->
    <filter id="shadowQR" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#FF8200" flood-opacity="0.4"/>
    </filter>

    <!-- Pattern para simular QR (patron de puntos 4x4) -->
    <pattern id="qrPattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#1e1e1e"/>
      <rect x="0" y="0" width="4" height="4" fill="#f0f0f0"/>
      <rect x="4" y="4" width="4" height="4" fill="#f0f0f0"/>
    </pattern>
  </defs>

  <!-- ===== FONDO ===== -->
  <rect width="800" height="1200" fill="url(#fondoPrincipalD)"/>

  <!-- Franja de acento superior (naranja Exceline — marco de marca) -->
  <rect x="0" y="0" width="800" height="8" fill="#FF8200"/>

  <!-- Franja de acento inferior -->
  <rect x="0" y="1192" width="800" height="8" fill="#FF8200"/>


  <!-- ===== ZONA 1: LOGO EXCELINE PROFESIONAL (area superior) ===== -->
  <rect x="40" y="28" width="320" height="56" rx="4" fill="none" stroke="#FF8200"
        stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="60" text-anchor="middle" fill="#FF8200" font-size="13"
        font-weight="600" letter-spacing="1">
    EXCELINE PROFESIONAL [logo aqui]
  </text>

  <!-- Linea divisora naranja -->
  <rect x="40" y="94" width="720" height="2" fill="#FF8200" opacity="0.6"/>


  <!-- ===== ZONA 2: LENGUETA / CINTILLA — "NUEVO / AVERIGUALO" ===== -->
  <!--
    DECISION DE DISENO: La lengueta de D reemplaza el superlativo cualitativo
    de A/B ("La Proteccion mas completa") por una invitacion al escaneo.
    "NUEVO" activa la curiosidad del comprador que conoce el GSM-RB como producto
    de referencia. "AVERIGUALO" es la conversion inmediata al QR adyacente.
    La lengueta y el QR funcionan como sistema: el ojo va de "AVERIGUALO" al QR.
    Fuente: Solenne SO-1 v2 §Alternativa D — Brief para Atlas punto 4.
    GATE PENDIENTE: "AVERIGUALO" requiere confirmacion explícita de Bruna.
  -->
  <rect x="40" y="110" width="720" height="80" rx="6" fill="#FF8200"/>
  <!-- "NUEVO" en tipografia dominante — grande, oscuro, impactante -->
  <text x="320" y="143" text-anchor="middle" fill="#0d0d0d" font-size="22"
        font-weight="900" letter-spacing="6">
    NUEVO
  </text>
  <!-- "AVERIGUALO" como invitacion visual al QR -->
  <text x="320" y="172" text-anchor="middle" fill="#0d0d0d" font-size="17"
        font-weight="700" letter-spacing="2">
    &#xA1;AVERIGUALO
  </text>
  <!-- Flecha pequeña apuntando al QR de la lengüeta — conecta "AVERIGUALO" con el QR -->
  <polygon points="620,141 648,141 648,133 670,150 648,167 648,159 620,159"
           fill="#0d0d0d" opacity="0.6"/>


  <!-- ===== ZONA 3: IMAGEN PRODUCTO GSM-RB ===== -->
  <rect x="220" y="208" width="360" height="280" rx="8" fill="#2a2a2a"
        stroke="#444" stroke-width="1"/>
  <text x="400" y="330" text-anchor="middle" fill="#555" font-size="14">
    Foto producto GSM-RB
  </text>
  <text x="400" y="350" text-anchor="middle" fill="#555" font-size="12">
    (Oz inserta imagen oficial)
  </text>
  <text x="400" y="478" text-anchor="middle" fill="#888" font-size="13"
        letter-spacing="2">
    GSM-RB
  </text>


  <!-- ===== ZONA 4: BLOQUE VISUAL UNITARIO — claims + QR (zona de titulos) ===== -->
  <!--
    DECISION DE DISENO CLAVE (Brief D punto 1 y 2):
    Los tres claims y el QR conviven en el mismo nivel jerarquico dentro de un bloque
    visual unico. El QR NO va abajo — va a la derecha del bloque de claims, al mismo
    nivel que el claim protagonista. La flecha conectora gráfica une los tres claims
    en lectura de arriba hacia abajo, comunicando cadena causal: velocidad →
    proteccion inverter → proteccion termica.

    Layout del bloque:
    [ BLOQUE DE CLAIMS (izq, 560px)  ] [ QR (der, 120px) ]
    [ Hasta 10x mas rapido           ] [ ■■■■■■■■■■■■■■■ ]
    [ < 0,03 s ante parpadeos        ] [ ■■■■■■■■■■■■■■■ ]
    [  ↓ flecha conectora            ] [ ■■■■■■■■■■■■■■■ ]
    [ Protege tecnologia Inverter    ] [ ■■■■■■■■■■■■■■■ ]
    [  ↓ flecha conectora            ] [                 ]
    [ Sensor NTC: protege calor*     ] [                 ]

    El QR ocupa 120x120px (1.5 cm fisico en el blister real a 204 dpi aprox.) — minimo
    requerido por Solenne SO-1 v2 Brief Atlas punto 1.
  -->

  <!-- Contenedor del bloque unitario completo -->
  <rect x="40" y="508" width="720" height="390" rx="8"
        fill="url(#bloqueGradienteD)"
        stroke="#FF8200" stroke-width="2" stroke-opacity="0.8"/>

  <!-- Borde izquierdo naranja solido (marca de marca — consistente con A/B/C) -->
  <rect x="40" y="508" width="6" height="390" rx="3" fill="#FF8200"/>

  <!-- Etiqueta de zona (orientacion visual interna) -->
  <text x="54" y="528" fill="#FF8200" font-size="9" font-weight="600"
        letter-spacing="1" opacity="0.7">
    BLOQUE VISUAL UNITARIO — zona de titulos
  </text>


  <!-- ~~~~ SUB-ZONA 4A: CLAIM PROTAGONISTA + SUB-DATO ~~~~ -->
  <!--
    "Hasta 10 veces mas rapido" — tipografia NOTORIAMENTE mayor que los otros claims.
    Es el dato visceral protagonista de D. Brief punto 3.
    "< 0,03 s ante parpadeos" — sub-dato de credibilidad inmediatamente debajo.
  -->

  <!-- Icono rayo / parpadeo (sistema iconos Exceline — identico a A/B pero mas pequeño
       porque el protagonismo lo tiene el ratio "10x", no el icono) -->
  <g transform="translate(54, 535)">
    <polygon points="15,0 0,22 10,22 5,46 23,18 13,18 20,0"
             fill="#FF8200" opacity="0.85"/>
    <circle cx="11" cy="23" r="27" fill="none" stroke="#FF8200"
            stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- DATO PROTAGONISTA: "Hasta 10 veces mas rapido" -->
  <!-- Tipografia: Montserrat Black 52px — mayor que cualquier elemento en A/B/C -->
  <text x="110" y="578" fill="url(#gradienteDato)" font-size="52" font-weight="900"
        letter-spacing="-1" filter="url(#glowNaranja)">
    Hasta 10 veces
  </text>
  <text x="110" y="622" fill="url(#gradienteDato)" font-size="52" font-weight="900"
        letter-spacing="-1" filter="url(#glowNaranja)">
    m&#225;s r&#225;pido
  </text>

  <!-- Sub-dato tecnico: "< 0,03 s ante parpadeos" — credibilidad del ratio -->
  <text x="110" y="648" fill="#e0e0e0" font-size="15" font-weight="500"
        letter-spacing="0.3">
    &lt; 0,03 s ante parpadeos — verificado I&amp;D Genteca
  </text>

  <!-- Separador interno -->
  <rect x="110" y="660" width="530" height="1" fill="#FF8200" opacity="0.3"/>


  <!-- ~~~~ FLECHA CONECTORA 1: velocidad → proteccion inverter ~~~~ -->
  <!--
    La flecha conectora es elemento FUNCIONAL, no decorativo.
    Comunica cadena causal visible. Brief punto 2.
    Opcion elegida: flecha tipografica con tratamiento grafico (linea naranja + punta).
  -->
  <g transform="translate(110, 665)">
    <!-- Linea vertical naranja (conector) -->
    <line x1="20" y1="0" x2="20" y2="22" stroke="#FF8200" stroke-width="2.5"
          opacity="0.85" stroke-linecap="round"/>
    <!-- Punta de flecha -->
    <polygon points="12,22 20,34 28,22" fill="#FF8200" opacity="0.85"/>
    <!-- Etiqueta de causalidad -->
    <text x="45" y="18" fill="#FF8200" font-size="10" font-weight="600"
          letter-spacing="0.8" opacity="0.8">
      por eso...
    </text>
  </g>


  <!-- ~~~~ SUB-ZONA 4B: CLAIM 2 — "Protege tecnologia Inverter" ~~~~ -->
  <!-- Segundo en jerarquía — tipografia clara pero menor que el protagonista -->
  <g transform="translate(54, 700)">
    <!-- Icono conector onda→flecha→inverter (tomado de Alt. A, reducido) -->
    <path d="M 14,14 Q 22,4 30,14 Q 38,24 46,14 Q 54,4 62,14"
          fill="none" stroke="#FF8200" stroke-width="1.8" opacity="0.65"/>
    <line x1="70" y1="14" x2="95" y2="14" stroke="#FF8200" stroke-width="2"
          opacity="0.7"/>
    <polygon points="95,9 105,14 95,19" fill="#FF8200" opacity="0.7"/>
    <path d="M 112,20 L 112,8 L 120,8 L 120,20 L 128,20 L 128,8 L 136,8 L 136,20"
          fill="none" stroke="#FF8200" stroke-width="1.8" opacity=" 0.65"/>
    <text x="148" y="18" fill="#FF8200" font-size="10" font-weight="700"
          opacity="0.75" letter-spacing="1">
      INV.
    </text>
  </g>

  <text x="110" y="736" fill="#ffffff" font-size="22" font-weight="700"
        letter-spacing="0.3">
    Protege tecnolog&#237;a Inverter
  </text>


  <!-- ~~~~ FLECHA CONECTORA 2: proteccion inverter → proteccion termica ~~~~ -->
  <g transform="translate(110, 742)">
    <line x1="20" y1="0" x2="20" y2="22" stroke="#FF8200" stroke-width="2.5"
          opacity="0.7" stroke-linecap="round"/>
    <polygon points="12,22 20,34 28,22" fill="#FF8200" opacity="0.7"/>
    <text x="45" y="18" fill="#FF8200" font-size="10" font-weight="600"
          letter-spacing="0.8" opacity="0.7">
      adem&#225;s...
    </text>
  </g>


  <!-- ~~~~ SUB-ZONA 4C: CLAIM 3 — "Sensor NTC: protege contra calentamiento*" ~~~~ -->
  <!--
    Tercer claim — jerarquía ligeramente menor que Claim 2.
    Formulacion narrativa de D: "protege contra calentamiento" describe la consecuencia.
    GATE PENDIENTE: esta reformulacion de Claim D requiere confirmacion explícita de Bruna.
    Asterisco obligatorio (Bruna §2 Claim D).
  -->

  <!-- Icono termometro / sensor NTC (identico a A/B para reconocimiento consistente) -->
  <g transform="translate(64, 779)">
    <rect x="8" y="0" width="10" height="28" rx="5" fill="#737578"/>
    <circle cx="13" cy="33" r="7" fill="#737578"/>
    <rect x="11" y="10" width="4" height="18" rx="2" fill="#FF8200" opacity="0.7"/>
  </g>

  <text x="110" y="798" fill="#cccccc" font-size="18" font-weight="600">
    Sensor NTC: protege contra calentamiento
  </text>
  <!-- Asterisco obligatorio — legible y separado del texto -->
  <text x="600" y="795" fill="#FF8200" font-size="22" font-weight="900">*</text>

  <!-- Sub-linea tecnica aclaratoria -->
  <text x="110" y="820" fill="#888" font-size="12" font-weight="400"
        letter-spacing="0.3">
    Autoproteccion termica del protector y del cableado
  </text>

  <!-- Separador inferior del bloque -->
  <rect x="54" y="838" width="556" height="1" fill="#FF8200" opacity="0.25"/>


  <!-- ~~~~ QR EN ZONA DE TITULOS ~~~~ -->
  <!--
    DECISION DE DISENO CRITICA (Brief D punto 1):
    El QR va en la PARTE DERECHA del bloque unitario, al mismo nivel jerarquico
    que los tres claims. No va abajo (ese era el posicionamiento de servicio anterior).

    Tamaño: 120 x 120 px en el SVG.
    Equivalencia fisica: en un blíster de ~7cm de ancho, 120/800 * 70mm = ~10.5mm.
    NOTA: el blister real del GSM-RB es mas ancho que 7cm. En formato real A4
    (210mm ancho) la proporcion es 120/800 * 210mm = ~31.5mm — ampliamente
    sobre el minimo de 15mm exigido por Solenne.
    Confirmacion de legibilidad: el QR supera el minimo de 1.5 x 1.5 cm en cualquier
    escenario realista del blister.

    OPCION DE QR RECOMENDADA POR ATLAS: ver spec §5 (Opcion A — redireccion del QR
    existente al destino de innovaciones + migracion a zona superior).

    Placeholder visual: patron 2x2 que simula un QR para comunicar posicion y tamaño.
  -->

  <!-- Marco del QR con acento naranja -->
  <rect x="640" y="520" width="108" height="108" rx="6"
        fill="#f5f5f5" stroke="#FF8200" stroke-width="3"
        filter="url(#shadowQR)"/>

  <!-- Patron QR simulado (finder patterns en las 3 esquinas) -->
  <!-- Finder superior izquierdo -->
  <rect x="648" y="528" width="24" height="24" rx="2" fill="#1a1a1a"/>
  <rect x="652" y="532" width="16" height="16" rx="1" fill="#f5f5f5"/>
  <rect x="656" y="536" width="8" height="8" rx="1" fill="#1a1a1a"/>

  <!-- Finder superior derecho -->
  <rect x="716" y="528" width="24" height="24" rx="2" fill="#1a1a1a"/>
  <rect x="720" y="532" width="16" height="16" rx="1" fill="#f5f5f5"/>
  <rect x="724" y="536" width="8" height="8" rx="1" fill="#1a1a1a"/>

  <!-- Finder inferior izquierdo -->
  <rect x="648" y="596" width="24" height="24" rx="2" fill="#1a1a1a"/>
  <rect x="652" y="600" width="16" height="16" rx="1" fill="#f5f5f5"/>
  <rect x="656" y="604" width="8" height="8" rx="1" fill="#1a1a1a"/>

  <!-- Datos simulados del QR (puntos aleatorios en zona libre) -->
  <g fill="#1a1a1a" opacity="0.85">
    <!-- fila 1 zona datos -->
    <rect x="682" y="560" width="6" height="6" rx="1"/>
    <rect x="694" y="560" width="6" height="6" rx="1"/>
    <rect x="706" y="560" width="6" height="6" rx="1"/>
    <rect x="700" y="572" width="6" height="6" rx="1"/>
    <rect x="688" y="572" width="6" height="6" rx="1"/>
    <rect x="712" y="572" width="6" height="6" rx="1"/>
    <rect x="682" y="584" width="6" height="6" rx="1"/>
    <rect x="706" y="584" width="6" height="6" rx="1"/>
    <!-- fila inferior zona libre -->
    <rect x="682" y="596" width="6" height="6" rx="1"/>
    <rect x="694" y="596" width="6" height="6" rx="1"/>
    <rect x="706" y="596" width="6" height="6" rx="1"/>
    <rect x="718" y="596" width="6" height="6" rx="1"/>
    <rect x="682" y="608" width="6" height="6" rx="1"/>
    <rect x="700" y="608" width="6" height="6" rx="1"/>
    <rect x="712" y="608" width="6" height="6" rx="1"/>
  </g>

  <!-- Etiqueta bajo el QR -->
  <text x="694" y="642" text-anchor="middle" fill="#FF8200" font-size="9"
        font-weight="700" letter-spacing="0.5">
    [QR dinamico]
  </text>

  <!-- Indicador de tamaño minimo (nota para Oz) -->
  <!-- Linea de cota minima visual -->
  <line x1="640" y1="645" x2="748" y2="645" stroke="#FF8200" stroke-width="0.5"
        opacity="0.5" stroke-dasharray="2,2"/>
  <text x="694" y="655" text-anchor="middle" fill="#888" font-size="8"
        opacity="0.7">
    min. 1,5 cm fisico
  </text>


  <!-- ===== ZONA 5: ASTERISCO — nota de remision al retiro ===== -->
  <rect x="40" y="900" width="720" height="2" fill="#333"/>

  <text x="40" y="928" fill="#FF8200" font-size="14" font-weight="700">*</text>
  <text x="56" y="928" fill="#888" font-size="12" font-weight="400">
    Ver informacion del Sensor NTC al reverso del empaque.
  </text>

  <!-- Nota adicional para D: "Hasta 10 veces mas rapido" remite al retiro -->
  <text x="40" y="948" fill="#888" font-size="11" font-weight="400">
    Ver caveat de velocidad comparativa al reverso del empaque.
  </text>


  <!-- ===== ZONA 6: DATOS DE MODELOS Y ESPECIFICACIONES TECNICAS ===== -->
  <!-- Franja inferior — identica en estructura a A/B/C para consistencia -->
  <rect x="0" y="966" width="800" height="120" fill="#111111"/>
  <rect x="0" y="966" width="800" height="2" fill="#FF8200" opacity="0.4"/>

  <text x="400" y="994" text-anchor="middle" fill="#666" font-size="12"
        letter-spacing="1">
    ESPECIFICACIONES TECNICAS
  </text>

  <!-- Placeholders datos tecnicos por modelo (Oz completa con HDE) -->
  <text x="130" y="1018" text-anchor="middle" fill="#888" font-size="11">
    Voltaje nom.
  </text>
  <text x="130" y="1035" text-anchor="middle" fill="#aaa" font-size="13"
        font-weight="600">
    [XX] V
  </text>

  <text x="270" y="1018" text-anchor="middle" fill="#888" font-size="11">
    Corriente max.
  </text>
  <text x="270" y="1035" text-anchor="middle" fill="#aaa" font-size="13"
        font-weight="600">
    [XX] A
  </text>

  <text x="410" y="1018" text-anchor="middle" fill="#888" font-size="11">
    Pot. protegida
  </text>
  <text x="410" y="1035" text-anchor="middle" fill="#aaa" font-size="13"
        font-weight="600">
    [XX] VA
  </text>

  <text x="550" y="1018" text-anchor="middle" fill="#888" font-size="11">
    T° respuesta
  </text>
  <!-- El dato de velocidad se destaca en naranja — refuerzo del claim protagonista -->
  <text x="550" y="1035" text-anchor="middle" fill="#FF8200" font-size="13"
        font-weight="700">
    &lt; 30 ms
  </text>

  <text x="690" y="1018" text-anchor="middle" fill="#888" font-size="11">
    Hecho en
  </text>
  <text x="690" y="1035" text-anchor="middle" fill="#aaa" font-size="13"
        font-weight="600">
    Venezuela
  </text>


  <!-- ===== ZONA 7: BARRA INFERIOR (codigo de barras) ===== -->
  <!--
    NOTA DE QR: En la Alt. D el QR principal ya esta en la zona de titulos (Zona 4).
    La barra inferior NO repite el QR de innovaciones. Si el QR existente del empaque
    tenia funcion secundaria (manual tecnico / garantia), ese QR secundario puede
    mantenerse aqui. Decision pendiente de Raul (ver spec §5).
    Esta zona mantiene solo el codigo de barras.
  -->
  <rect x="0" y="1086" width="800" height="106" fill="#0d0d0d"/>
  <rect x="0" y="1086" width="800" height="1" fill="#333"/>

  <!-- Placeholder QR secundario opcional (para manual tecnico si aplica) -->
  <rect x="40" y="1096" width="72" height="72" fill="#1a1a1a"
        stroke="#333" stroke-width="1" rx="3"/>
  <text x="76" y="1130" text-anchor="middle" fill="#444" font-size="9">
    [QR secundario]
  </text>
  <text x="76" y="1142" text-anchor="middle" fill="#444" font-size="8">
    opcional — ver spec §5
  </text>

  <!-- Codigo de barras placeholder -->
  <rect x="580" y="1100" width="180" height="60" fill="none"
        stroke="#333" stroke-width="1"/>
  <text x="670" y="1135" text-anchor="middle" fill="#444" font-size="10">
    [Codigo de barras]
  </text>


  <!-- ===== NOTA DE REFERENCIA MODELO ===== -->
  <!--
    Este mockup usa GSM-RB como modelo de referencia.
    GSM-MB / GSM-RF / GSM-RE: mismo layout, paleta de color especifica por modelo.
    Oz adapta la franja de color del blister y los datos numericos de HDE por modelo.
    La estructura del bloque unitario D (flecha conectora + QR en zona de titulos)
    se replica igual en los 4 modelos.
  -->

</svg>
